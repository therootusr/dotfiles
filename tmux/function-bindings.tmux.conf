#---------------------------- Workspace Popup ---------------------------------
# prefix + f: file picker popup -> add to vim buffers
# -T popup title not supported in tmux version being used.
bind -n F1 display-popup -E -w 80% -h 80% "$HOME/workspace/personal/dotfiles/tmux/tmux-workspace-file-picker.sh"
bind -n F2 display-popup -E -w 80% -h 80% "find . | fzf -m --ansi --prompt='copy-filepath> ' --preview='wc {} && head {}' | tmux load-buffer -w -"
#---------------------------- Workspace Popup ---------------------------------

#-------------------------------- Misc ----------------------------------------
# F4: save scrollback to file, put file path in system clipboard via tmux buffer (set-clipboard)
# - One load-buffer with path only; tmux syncs that to sys clipboard (no OSC 52 / pbcopy)
bind -n F4 run-shell ' \
  dir="$HOME/workspace/tmp/tmux/scrollback-buffers" && \
  mkdir -p "$dir" && \
  file="$dir/#S_#I_#P.$(date +"%d%b%Y_%H%M_%Z").sh" && \
  tmux capture-pane -S - -E - -p > "$file" && \
  printf "%s" "$file" | tmux load-buffer -w - && \
  tmux display-message "Scrollback saved -> path in clipboard -> $file" \
'
#-------------------------------- Misc ----------------------------------------

#---------------------------- New window: N panes -----------------------------
# prefix + T: prompt for pane count and create that many panes (tiled)
#   Re-tile after each split so the active pane doesn't shrink below the min
#   size during the loop, which can otherwise block further splits.
# prefix + S: toggle synchronize-panes (same input to all panes)
# prefix + |: select tiled layout (4 corners)
unbind T
bind T command-prompt -p "Panes:" "run-shell ' \
  n=%%; \
  if [ -z \"\$n\" ]; then tmux display-message \"Enter a number\"; exit 0; fi; \
  case \"\$n\" in *[!0-9]*) tmux display-message \"Enter a number\"; exit 0 ;; esac; \
  if [ \"\$n\" -lt 1 ]; then exit 0; fi; \
  tmux new-window -c \"#{pane_current_path}\"; \
  i=2; \
  while [ \"\$i\" -le \"\$n\" ]; do \
    tmux split-window -v -c \"#{pane_current_path}\"; \
    tmux select-layout tiled; \
    i=\$((i+1)); \
  done; \
'"

bind S if-shell -F '#{pane_synchronized}' {
  setw synchronize-panes off
  display-message "synchronize-panes off"
} {
  setw synchronize-panes on
  display-message "synchronize-panes on"
}

