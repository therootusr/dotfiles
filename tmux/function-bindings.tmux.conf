#---------------------------- Workspace Popup ---------------------------------
# prefix + f: file picker popup -> add to vim buffers
# -T popup title not supported in tmux version being used.
bind -n F1 display-popup -E -w 80% -h 80% "$HOME/workspace/personal/dotfiles/tmux/tmux-workspace-file-picker.sh"
bind -n F2 display-popup -E -w 80% -h 80% "find . | fzf -m --ansi --prompt='copy-filepath> ' --preview='wc {} && head {}' | tmux load-buffer -w -"
#---------------------------- Workspace Popup ---------------------------------

#---------------------- Scrollback + search UX --------------------------------
# Alt+v : open full scrollback in $EDITOR with line numbers (solves the
#         "no line numbers in copy-mode" problem — full editor power).
bind -n M-v run-shell 'tmux display-popup -E -w 95% -h 95% "$HOME/workspace/personal/dotfiles/tmux/tmux-open-scrollback.sh #D"'

# Alt+f : fzf-search scrollback (multi-select with Tab, Enter copies to clipboard)
bind -n M-f run-shell 'tmux display-popup -E -w 80% -h 80% "$HOME/workspace/personal/dotfiles/tmux/tmux-fzf-scrollback.sh #D"'

# Alt+c : fzf-pick command(s) + output from pane scrollback -> clipboard.
#         Enter = newest command, TAB = multi-select; copied chronologically,
#         prompt-stripped. Prompt types come from the file named by
#         TMUX_COPY_SHELL_PROMPTS (see tmux-copy-cmds.shell-prompts.example).
bind -n M-c run-shell 'tmux display-popup -E -w 95% -h 95% "$HOME/workspace/personal/dotfiles/tmux/tmux-copy-cmds.sh #D"'

# prefix + p : toggle keeping the prompt marker in Alt+c copies
bind p if-shell -F '#{==:#{@copy-include-shell-prompt},1}' {
  set -g @copy-include-shell-prompt 0
  display-message "copy: prompt EXCLUDED (default)"
} {
  set -g @copy-include-shell-prompt 1
  display-message "copy: prompt INCLUDED"
}

# F3: save the most-recent paste buffer to a file, path -> clipboard (sibling of F4).
bind -n F3 run-shell ' \
  dir="$HOME/workspace/tmp/tmux/buffers"; mkdir -p "$dir"; \
  name="$(tmux list-buffers | head -1 | cut -d: -f1)"; \
  [ -n "$name" ] || { tmux display-message "No buffers to save"; exit 0; }; \
  file="$dir/$name.$(date +"%d%b%Y_%H%M_%Z").txt"; \
  tmux save-buffer -b "$name" "$file"; \
  printf "%s" "$file" | tmux load-buffer -w -; \
  tmux display-message "Buffer $name saved -> path in clipboard -> $file" \
'

# F4: save scrollback to file, put file path in system clipboard via tmux buffer (set-clipboard)
# - One load-buffer with path only; tmux syncs that to sys clipboard (no OSC 52 / pbcopy)
bind -n F4 run-shell ' \
  dir="$HOME/workspace/tmp/tmux/scrollback-buffers" && \
  mkdir -p "$dir" && \
  file="$dir/#S_#I_#P.$(date +"%d%b%Y_%H%M_%Z").sh" && \
  tmux capture-pane -S - -E - -p > "$file" && \
  printf "%s" "$file" | tmux load-buffer -w - && \
  tmux display-message "Scrollback saved -> path in clipboard -> $file" \
'
#---------------------- Scrollback + search UX --------------------------------

#---------------------------- New window: N panes -----------------------------
# prefix + T: prompt for pane count and create that many panes (tiled)
#   Re-tile after each split so the active pane doesn't shrink below the min
#   size during the loop, which can otherwise block further splits.
# prefix + S: toggle synchronize-panes (same input to all panes)
# prefix + |: select tiled layout (4 corners)
unbind T
bind T command-prompt -p "Panes:" "run-shell ' \
  n=%%; \
  if [ -z \"\$n\" ]; then tmux display-message \"Enter a number\"; exit 0; fi; \
  case \"\$n\" in *[!0-9]*) tmux display-message \"Enter a number\"; exit 0 ;; esac; \
  if [ \"\$n\" -lt 1 ]; then exit 0; fi; \
  tmux new-window -c \"#{pane_current_path}\"; \
  i=2; \
  while [ \"\$i\" -le \"\$n\" ]; do \
    tmux split-window -v -c \"#{pane_current_path}\"; \
    tmux select-layout tiled; \
    i=\$((i+1)); \
  done; \
'"

bind S if-shell -F '#{pane_synchronized}' {
  setw synchronize-panes off
  display-message "synchronize-panes off"
} {
  setw synchronize-panes on
  display-message "synchronize-panes on"
}

#---------------------------- New window: N panes -----------------------------
