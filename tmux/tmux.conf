#-------------------------------- keybindings ---------------------------------
source-file ~/workspace/personal/dotfiles/tmux/workman-keymap.tmux.conf
source-file ~/workspace/personal/dotfiles/tmux/function-bindings.tmux.conf
#-------------------------------- keybindings ---------------------------------

#----------------------------------- MRU --------------------------------------
set-hook -g pane-focus-in "run-shell -b '$HOME/workspace/personal/dotfiles/tmux/tmux-mru.sh hook'"
#----------------------------------- MRU --------------------------------------

#----------------------------------- Misc -------------------------------------
# vi copy-mode
setw -g mode-keys vi

set -g default-terminal "tmux-256color"
set -g mouse on

# search settings
setw -g wrap-search off

# set-clipboard='external' seems to prevent programs inside tmux from setting
# the sys clipboard.
# Enable OSC 52 clipboard integration
# 'on' allows programs inside tmux to set the system clipboard (via OSC 52)
# and allows tmux to send its own copy buffer to the system clipboard.
# Malicious programs can abuse this and inject crafted data in the sys
# clipboard.
# Also, OSC 52 has support for reading sys clipboard, an even bigger risk:
#   printf '\033]52;c;?\007'
# It's unclear if tmux disables this by default/always/when-exactly.
# However, I've blocked clipboard read in iTerm2 settings.
# The iTerm2v3.6.8 setting presents itself as (AllowPaste.secureSetting):
# "Applications in terminal may access clipboard" > "Allow sending of clipboard contents?"
set -g set-clipboard on

# Note: We DO NOT additionally use `send-keys C-l` (or `-R`) here. While C-l gracefully clears
# most TUIs, sending ^L carelessly is risky on prod servers (e.g., poorly written scripts
# might interpret it as confirmation to a "Press any key" or [y/N] prompt).
# The downside of omitting C-l is that the lines currently visible on the screen are not
# cleared, which means they will eventually scroll up and remain in the scrollback buffer.
# `clear-history` and `refresh-client` are 100% safe, purely tmux-internal operations.
# (Whereas `send-keys -R` is also safe as it doesn't send bytes to the inner program,
# but it forcefully wipes the screen leaving a broken-UI/missing-prompt. So, it
# clears the prompt along with any typed command, pressing Enter carelessly might
# exec the hidden command without realizing.
# C-l politely asks the inner program to redraw but carries the aforementioned risk).
#
# Note on terminal-level shortcuts:
# We DO NOT map terminal shortcuts (e.g., iTerm2 Cmd+l) to send F3 escape-seq/hex-code.
# Terminals cannot conditionally send sequences only when inside a tmux session.
# Pressing the shortcut outside tmux sends F3 directly to the active program,
# creating an unacceptable risk of unintended input on remote servers.
bind F3 clear-history \; refresh-client
#----------------------------------- Misc -------------------------------------

#---------------- https://github.com/tmux-plugins/tmux-sensible ---------------
# Address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 0
set -g history-limit 50000
# Increase tmux messages display duration
set -g display-time 10000
# Refresh 'status-left' and 'status-right' more often, from every 15s to 5s
set -g status-interval 5
# Emacs key bindings in tmux command prompt (prefix + :) are better than
# vi keys, even for vim users
set -g status-keys emacs
# Focus events enabled for terminals that support them
set -g focus-events on
#---------------- https://github.com/tmux-plugins/tmux-sensible ---------------

#---------------------------------- Colors ------------------------------------
set -g @purple-calm "#8888C6"
set -g @peach-calm "#e06c75"
set -g @sky "#addadb"
set -g @grass-cool "#A5C261"
set -g @green-calm "#629755"
set -g @slate "#727575"
set -g @blue-gray "#60799a"
#---------------------------------- Colors ------------------------------------

#----------------------------- Windows and Panes ------------------------------
set -g base-index 1
set -g pane-base-index 1

# Automatically renumber window numbers on closing a pane
set -g renumber-windows on

# Dynamically update term tab and window titles.
set -g set-titles on

set -g pane-border-lines heavy
set -g pane-border-style "fg=#{@slate}"
set -g pane-active-border-style "fg=#{@blue-gray}"
#----------------------------- Windows and Panes ------------------------------

#----------------------------------- Status -----------------------------------
set -g status-position bottom
setw -g monitor-activity on
# setw -g monitor-silence 300

set -g status-justify centre

set -g status-style "fg=#{@purple-calm},bg=default"
set -g status-left-length 100
# alt glyph: 
set -g status-left "#[fg=#{@sky},bold] ▶◀ #S #[fg=#{@grass-cool},nobold]| #{?@mru_walking,#[fg=#{@peach-calm}]#{@mru_walking} ,}"

set -g window-status-format "#I:#W#{?window_activity_flag,🚀,}#{?window_silence_flag,🤨,}#{?window_marked_flag,📌,}#{?window_bell_flag,🥁,}"
# When prefix is active, current window tab is red; otherwise normal
# window_bell_flag, window_activity_flag, window_silence_flag don't seem
# to affect curr window.
set -g window-status-current-format "#[fg=#{?client_prefix,#{@peach-calm},#{@grass-cool}},bold] ▶ #[underscore]#I:#W#{?window_zoomed_flag,🔎︎,}#{?window_marked_flag,📌,}"

set -g status-right-length 100
set -g status-right "#[fg=#{@peach-calm},bg=default] #[fg=#{@peach-calm},bg=default]#(uptime | sed -E 's/.*up([^,]*).*average:(.*)/\\1 –\\2/' | sed -e 's/, /│/g')    #[fg=#{@peach-calm},bg=default]#(awk '($1==\"MemTotal:\"){t=$2} ($1==\"MemAvailable:\"){a=$2} t&&a{printf \"%.0f%%\", (t-a)*100/t; exit}' /proc/meminfo)   #[fg=#{@peach-calm},bg=default] %H%M:%d-%b "

set -g message-style "fg=default,bg=#{@green-calm}"
#----------------------------------- Status -----------------------------------
