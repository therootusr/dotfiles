#-------------------------------- keybindings ---------------------------------
source-file ~/workspace/personal/dotfiles/tmux/workman-keymap.tmux.conf
source-file ~/workspace/personal/dotfiles/tmux/function-bindings.tmux.conf
#-------------------------------- keybindings ---------------------------------

#----------------------------------- MRU --------------------------------------
set-hook -g pane-focus-in "run-shell -b '$HOME/workspace/personal/dotfiles/tmux/tmux-mru.sh hook'"
#----------------------------------- MRU --------------------------------------

#----------------------------------- Misc -------------------------------------
# vi copy-mode
setw -g mode-keys vi

set -g default-terminal "tmux-256color"
set -g mouse on

# search settings
setw -g wrap-search off

# ---------------------- Alt+c command picker (scrollback) --------------------
# tmux-copy-cmds.sh: fzf multi-select of commands + their output -> clipboard,
# in chronological order. Enter = newest command; TAB = multi-select.
# Prompt detection reads the shell-prompt-type table from the file named by
# TMUX_COPY_SHELL_PROMPTS (rows: <marker-ERE><TAB><num-prompt-lines-above>;
# start from tmux/tmux-copy-cmds.shell-prompts.example — its stock rows cover
# local p10k '❯' and ssh'd bash 'user@host:path$', so a mixed local+remote
# scrollback reassembles cleanly). No fallback table: unset/missing/malformed
# config aborts the picker with a message. display-popup sees the SERVER
# environment — set the var in ~/.zshenv/~/.zprofile (read before the server
# starts) or via 'tmux set-environment -g', NOT in ~/.zshrc.
# The one knob: @copy-include-shell-prompt   1 = keep the prompt marker in
# copied text (prefix+p).
set -g @copy-include-shell-prompt 0
# -----------------------------------------------------------------------------

# set-clipboard='external' seems to prevent programs inside tmux from setting
# the sys clipboard.
# Enable OSC 52 clipboard integration
# 'on' allows programs inside tmux to set the system clipboard (via OSC 52)
# and allows tmux to send its own copy buffer to the system clipboard.
# Malicious programs can abuse this and inject crafted data in the sys
# clipboard.
# Also, OSC 52 has support for reading sys clipboard, an even bigger risk:
#   printf '\033]52;c;?\007'
# It's unclear if tmux disables this by default/always/when-exactly.
# However, I've blocked clipboard read in iTerm2 settings.
# The iTerm2v3.6.8 setting presents itself as (AllowPaste.secureSetting):
# "Applications in terminal may access clipboard" > "Allow sending of clipboard contents?"
set -g set-clipboard on

# Clearing a pane — three mechanisms, safest first:
#   * clear-history  — purely tmux-internal; wipes scrollback only, never
#                      touches the visible rows or the inner program. 100%
#                      safe. (Ctrl+l)
#   * send-keys -R   — server-side terminal reset; also clears the VISIBLE
#                      screen (it scrolls the rows up into history). Sends no
#                      bytes to the program, so it's safe on remote/prod panes —
#                      but leaves a blank screen with no prompt until the next
#                      keystroke, and hides a half-typed line. Paired with
#                      clear-history to empty the scrolled-off rows. (Ctrl+k)
#                      (it clears the prompt along with any typed cmd, hitting
#                      Enter carelessly might exec the hidden cmd silently)
#   * send-keys C-l  — politely asks the program to redraw (cleanest: shell
#                      repaints its prompt at the top). NOT used: ^l on a prod
#                      [y/N]/"press any key" prompt may be read as confirmation.
#                      Only the shell can place the prompt, so this is the sole
#                      way to keep it — at that risk.
#
# Note on terminal-level shortcuts:
# We DO NOT map terminal shortcuts (e.g., iTerm2 Cmd+k) to send the
# Ctrl+l/Ctrl+k hex-code. Terminals cannot conditionally send sequences only
# when inside a tmux session. Pressing the shortcut outside tmux sends
# Ctrl+l/Ctrl+k directly to the active program, creating an unacceptable risk
# of unintended input on remote/prod servers. Clearing the terminal's own
# scrollback stays a separate, deliberate keypress.
#
# Both are sync-aware: clear-history and -R ignore synchronize-panes (only real
# key input is mirrored), so when sync is on we loop over every pane; otherwise
# just the active one.
#
# Ctrl+l — gentle clear: scrollback only (visible rows stay put).
bind -n C-l if-shell -F '#{pane_synchronized}' {
  run-shell 'tmux list-panes -F "##{pane_id}" | xargs -n1 tmux clear-history -t'
  refresh-client
} {
  clear-history
  refresh-client
}

# Ctrl+k — full clear: also wipe the visible screen. send-keys -R is a server-side
# terminal reset (no bytes reach the inner program); it scrolls the visible rows up
# into history, so it must run BEFORE clear-history, which then empties everything.
# Trade-off: leaves a blank screen with no prompt until your next keystroke, and hides
# any half-typed command line.
bind -n C-k if-shell -F '#{pane_synchronized}' {
  run-shell 'tmux list-panes -F "##{pane_id}" | while read p; do tmux send-keys -R -t "$p"; tmux clear-history -t "$p"; done'
  refresh-client
} {
  send-keys -R
  clear-history
  refresh-client
}
#----------------------------------- Misc -------------------------------------

#---------------- https://github.com/tmux-plugins/tmux-sensible ---------------
# Address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 0
set -g history-limit 50000
# Increase tmux messages display duration
set -g display-time 10000
# Refresh 'status-left' and 'status-right' more often, from every 15s to 5s
set -g status-interval 5
# Emacs key bindings in tmux command prompt (prefix + :) are better than
# vi keys, even for vim users
set -g status-keys emacs
# Focus events enabled for terminals that support them
set -g focus-events on
#---------------- https://github.com/tmux-plugins/tmux-sensible ---------------

#---------------------------------- Colors ------------------------------------
set -g @purple-calm "#8888C6"
set -g @peach-calm "#e06c75"
set -g @sky "#addadb"
set -g @grass-cool "#A5C261"
set -g @green-calm "#629755"
set -g @slate "#727575"
set -g @blue-gray "#60799a"
#---------------------------------- Colors ------------------------------------

#----------------------------- Windows and Panes ------------------------------
set -g base-index 1
set -g pane-base-index 1

# Automatically renumber window numbers on closing a pane
set -g renumber-windows on

# Dynamically update term tab and window titles.
set -g set-titles on

set -g pane-border-lines heavy
set -g pane-border-style "fg=#{@slate}"
set -g pane-active-border-style "fg=#{@grass-cool}"
#----------------------------- Windows and Panes ------------------------------

#----------------------------------- Status -----------------------------------
set -g status-position bottom
setw -g monitor-activity on
# setw -g monitor-silence 300

set -g status-justify centre

set -g status-style "fg=#{@purple-calm},bg=default"
set -g status-left-length 100
# alt glyph: 
set -g status-left "#[fg=#{@sky},bold] ▶◀ #S #[fg=#{@grass-cool},nobold]| #{?@mru_walking,#[fg=#{@peach-calm}]#{@mru_walking} ,}"

set -g window-status-format "#I:#W#{?window_activity_flag,🚀,}#{?window_silence_flag,🤨,}#{?window_marked_flag,📌,}#{?window_bell_flag,🥁,}"
# When prefix is active, current window tab is red; otherwise normal
# window_bell_flag, window_activity_flag, window_silence_flag don't seem
# to affect curr window.
set -g window-status-current-format "#[fg=#{?client_prefix,#{@peach-calm},#{@grass-cool}},bold] ▶ #[underscore]#I:#W#{?window_zoomed_flag,🔎︎,}#{?window_marked_flag,📌,}"

set -g status-right-length 100
set -g status-right "#[fg=#{@peach-calm},bg=default] #[fg=#{@peach-calm},bg=default]#(uptime | sed -E 's/.*up([^,]*).*average:(.*)/\\1 –\\2/' | sed -e 's/, /│/g')    #[fg=#{@peach-calm},bg=default]#(awk '($1==\"MemTotal:\"){t=$2} ($1==\"MemAvailable:\"){a=$2} t&&a{printf \"%.0f%%\", (t-a)*100/t; exit}' /proc/meminfo)   #[fg=#{@peach-calm},bg=default] %H%M:%d-%b "

set -g message-style "fg=default,bg=#{@green-calm}"
#----------------------------------- Status -----------------------------------
