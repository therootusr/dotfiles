unbind C-b
# Shift + tab
set -g prefix BTAB
bind BTAB send-prefix

###############################################################################
## copy-mode: start
###############################################################################

# Tmux copy-mode key bindings to match Workman layout from workman.map.vimrc
# Add to your tmux.conf or source this file.
# Assumes: setw -g mode-keys vi and prefix / for search (bind / copy-mode \; send-keys /)
#
# Vim mapping reference: workman.map.vimrc

# ----- Unbind defaults we're replacing with Workman -----
unbind-key -T copy-mode-vi h
unbind-key -T copy-mode-vi j
unbind-key -T copy-mode-vi k
unbind-key -T copy-mode-vi l
unbind-key -T copy-mode-vi n
unbind-key -T copy-mode-vi N
unbind-key -T copy-mode-vi o
unbind-key -T copy-mode-vi H
unbind-key -T copy-mode-vi e

# ----- Motion: u=up, n=left, e=down, o=right (your vim motion) -----
bind-key -T copy-mode-vi u send-keys -X cursor-up
bind-key -T copy-mode-vi n send-keys -X cursor-left
bind-key -T copy-mode-vi e send-keys -X cursor-down
bind-key -T copy-mode-vi o send-keys -X cursor-right

# ----- Line: 0 = first non-blank (vim ^), ^ = column 0 (vim 0) -----
bind-key -T copy-mode-vi 0 send-keys -X back-to-indentation
bind-key -T copy-mode-vi ^ send-keys -X start-of-line
# $ = end of line (unchanged in your vim; tmux default stays)

# ----- Search next/prev: l = next, L = prev (your vim l=// L=??) -----
bind-key -T copy-mode-vi l send-keys -X search-again
bind-key -T copy-mode-vi L send-keys -X search-reverse

# ----- Find char: h = jump forward, H = jump backward (your vim h=f H=F) -----
bind-key -T copy-mode-vi h command-prompt -1 -p "(jump forward)" "send -X jump-forward \"%%%\""
bind-key -T copy-mode-vi H command-prompt -1 -p "(jump backward)" "send -X jump-backward \"%%%\""

# ----- Search word under cursor: s = forward, S = backward (your vim s=* S=#) -----
bind-key -T copy-mode-vi s send-keys -FX search-forward "#{copy_cursor_word}"
bind-key -T copy-mode-vi S send-keys -FX search-backward "#{copy_cursor_word}"

# ------------------------ More vim-like copy + paste -------------------------
bind-key -T copy-mode-vi 'v' send -X begin-selection     # Begin selection in copy mode.
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle  # Begin selection in copy mode.
bind-key -T copy-mode-vi 'y' send -X copy-selection      # Yank selection in copy mode.

# ----- Not overridden (same as default or no vim analogue) -----
# Space=begin-selection, Enter=copy-pipe-and-cancel, q=cancel, Escape=clear-selection
# ,=jump-reverse, ;=jump-again, f/F/t/T=jump (still default; you use h/H)
# b=previous-word, w=next-word, g=history-top, G=history-bottom
# V=select-line, v=rectangle-toggle, D=copy-end-of-line
# C-u/C-d=halfpage, C-f/C-b=page, C-e/C-y=scroll (unchanged)
# H was top-line, L was bottom-line — now h=jump-forward, H=jump-backward, L=search-reverse
# To get top/middle/bottom of screen back, bind to other keys (e.g. g=history-top, G=history-bottom are buffer; no default for screen top/mid/bottom now on H/M/L)

###############################################################################
## copy-mode: end
###############################################################################

# -------------------- Paste buffer: list, save, load -------------------------
# <prefix> p = list paste buffers (choose one to paste)
unbind p
unbind ]
bind ] choose-buffer
# <prefix> S = save (top) buffer to file; <prefix> L = load file into buffer
bind S command-prompt -p "Save buffer to:" "run-shell 'tmux save-buffer -b 0 \"%%%\"'"
bind L command-prompt -p "Load buffer from:" "load-buffer \"%%%\""
bind-key p paste-buffer
# -------------------- Paste buffer: list, save, load -------------------------

#---------------------------------- Panes -------------------------------------
unbind %
unbind '"'
# https://dotfiles.joshmedeski.com/tmux.html#config -> '-c ...'
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane navigation (Workman: n=left, o=right, u=up, e=down)
unbind n
unbind o
bind n select-pane -L
bind o select-pane -R
bind u select-pane -U
bind e select-pane -D

# Pane maximize shortcuts (assumes pane-base-index 1)
unbind a
unbind h
unbind t
unbind g
unbind =
bind a if -F '#{window_zoomed_flag}' 'resize-pane -Z' '' \; select-pane -t 1 \; resize-pane -Z
bind h if -F '#{window_zoomed_flag}' 'resize-pane -Z' '' \; select-pane -t 2 \; resize-pane -Z
bind t if -F '#{window_zoomed_flag}' 'resize-pane -Z' '' \; select-pane -t 3 \; resize-pane -Z
bind g if -F '#{window_zoomed_flag}' 'resize-pane -Z' '' \; select-pane -t 4 \; resize-pane -Z
bind = if -F '#{window_zoomed_flag}' 'resize-pane -Z' '' \; select-layout even-horizontal
#---------------------------------- Panes -------------------------------------

# -------------------------- Kill windows/panes/all ---------------------------
unbind q
unbind x
bind q confirm-before -p "Kill pane #P? (y/n)" kill-pane
bind x confirm-before -p "Kill other panes? (y/n)" "kill-pane -a"
bind Q confirm-before -p "Kill window #I:#W? (y/n)" kill-window
bind X confirm-before -p "Kill Server #P? (y/n)" kill-server
# -------------------------- Kill windows/panes/all ---------------------------

#-------------------------------Window Navigation------------------------------
bind -n M-Tab next-window
bind -n M-S-Tab previous-window

# https://dotfiles.joshmedeski.com/tmux.html#config
bind-key -n MouseUp2Status kill-window -t= # Middle click on the window label to kill it
bind-key -n DoubleClick1Status new-window # Double click on the window list to open a new window
#-------------------------------Window Navigation------------------------------

#-------------------------------- Misc ----------------------------------------

# Prompt for silence period (seconds), then set monitor-silence
unbind H # n doesn't seem to be bound
bind H command-prompt -I 30 -p "Silence period (seconds):" "setw monitor-silence %%"

unbind C-r
bind C-r if-shell -F '#{automatic-rename}' {
  setw automatic-rename off
  command-prompt -I "#W" -p "Rename window:" "rename-window -- '%%'"
  display-message -d 1500 "automatic-rename off"
} {
  setw automatic-rename on
  display-message -d 1500 "automatic-rename on"
}

unbind R # default is often 'r' for rename-window; keep yours on 'R'
bind R command-prompt -I "#S" -p "Rename session:" "rename-session -- '%%'"

# alt+r: reload conf
unbind -n M-r
bind -n M-r source-file "$HOME/workspace/personal/dotfiles/tmux/tmux.conf" \; display-message -d 2000 "Reloaded tmux.conf"

#-------------------------------- Misc ----------------------------------------
